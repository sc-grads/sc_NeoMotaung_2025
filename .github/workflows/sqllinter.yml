name: SQL Linting with SQLFluff

on: 
  push:
    branches:
      - main  # Runs the linter on code pushed to the 'main' branch
  pull_request:
    branches:
      - main  # Runs the linter when a PR is created/updated targeting the 'main' branch

jobs:
  lint:
    name: Lint SQL Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8  # You can choose a different version if needed

      - name: Install SQLFluff
        run: |
          python -m pip install --upgrade pip
          pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint "src/**/*.sql"  # Update this path based on where your SQL files are located
          
      - name: Display Linter Results
        run: |
          sqlfluff lint "src/**/*.sql" --dialect mysql  # Change the dialect if necessary

